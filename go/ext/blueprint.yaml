---
apiVersion: v1
name: "go-ext"
description: "Go extended blueprint"
version: "0.1.0"
tags: ["go", "extended", "makefile"]

variables:
  - name: project_name
    description: "Name of the project"
    type: string
    required: true
    validate: "^[a-z][a-z0-9-]*$"

  - name: project_owner
    description: "Owner of the project"
    type: string
    required: true
    validate: "^[a-z][a-z0-9-]*$"

  - name: project_description
    description: "Description of the project"
    type: string
    required: true
    # validate: "^[a-z][a-z0-9-]*$"

  - name: license
    description: "License type"
    type: choice
    choices: ["MIT", "Apache-2.0", "BSD-3-Clause", "none"]
    default: "Apache-2.0"

sync:
  managed_files: []
  ignore: []

rename:
  "{{project_name}}/": "."
